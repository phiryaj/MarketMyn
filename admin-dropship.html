<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropship Admin - MakertMyn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Inline quick patch if style.css update is delayed */
        .admin-nav {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .admin-nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-nav a.active {
            color: #fff;
            font-weight: 700;
        }

        .admin-nav a:hover {
            color: #fff;
        }
    </style>
<script src="/js/admin-auth.js"></script>
</head>

<body style="background-color: #fcece8;"> <!-- Slight tint -->

    <!-- Admin Nav (Simplified) -->
    <div style="background:var(--dark); padding:15px 0;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo">
          <a href="index.html">
            <img src="logo.png" alt="MarketMyn Logo" style="height: 65px; width: auto; object-fit: contain; vertical-align: middle; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
          </a>
        </div>
            <div class="admin-nav">
                <a href="admin-dropship.html" class="active"><i class="fas fa-cloud-download-alt"></i> Importer</a>
                <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Store</a>
            </div>
        </div>
    </div>

    <div class="container admin-container">

        <div class="admin-header">
            <div>
                <h1 style="font-size:24px; margin-bottom:5px;">AliExpress Importer</h1>
                <p style="opacity:0.8; font-size:14px;">Paste a product URL to fetch details and add to your store.</p>
            </div>
            <div style="text-align:right;">
                <span class="status-badge" style="background:rgba(255,255,255,0.2); color:#fff;">Status:
                    Connected</span>
            </div>
        </div>

        <!-- 1. Importer Tool -->
        <div class="admin-card">
            <h3 style="margin-bottom:20px; font-size:18px;">Fetch Product</h3>
            <div class="import-box">
                <input type="text" id="aliUrl" placeholder="https://www.aliexpress.com/item/...">
                <button class="btn btn-cart" id="fetchBtn" style="border-radius:8px;">Fetch Product</button>
            </div>

            <!-- Preview Section (Hidden initially) -->
            <div class="import-preview" id="previewSection" style="display:none;">
                <div class="preview-image">
                    <img id="previewImg" src="" alt="Preview">
                </div>
                <div class="preview-details">
                    <input type="hidden" id="pImg"> <!-- Store URL -->

                    <div class="form-group">
                        <label>Product Title</label>
                        <input type="text" id="pTitle">
                    </div>

                    <div class="row-group">
                        <div class="form-group" style="flex:1;">
                            <label>Cost Price (R)</label>
                            <input type="number" id="pCost" readonly style="background:#f5f5f5;">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Selling Price (R) <span style="color:green; font-size:11px;">(Your
                                    Markup)</span></label>
                            <input type="number" id="pPrice" style="font-weight:bold; color:var(--primary-color);">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Assign Category</label>
                        <select id="pCategory">
                            <option value="RC">RC & The Vehicles</option>
                            <option value="Blocks">Building & Blocks</option>
                            <option value="Education">Education</option>
                            <option value="Figures">Figures & Dolls</option>
                            <option value="Outdoor">Sports & Outdoor</option>
                            <option value="Hobby">Hobby & Fun</option>
                        </select>
                    </div>

                    <button class="btn btn-primary" id="pushBtn" style="width:100%; margin-top:10px;">
                        <i class="fas fa-check-circle"></i> Push to Store
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. Recent Imports -->
        <div class="admin-card">
            <h3 style="margin-bottom:20px; font-size:18px;">Recent Imports</h3>
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Selling Price</th>
                            <th>Cost</th>
                            <th>Profit</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="importsTableBody">
                        <!-- JS renders here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="js/dropship.js"></script>
</body>

</html>
