<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MakertMyn</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .auth-wrap {
      background: #f5f5f5;
      padding: 50px 0;
      min-height: 80vh;
    }

    .auth-card {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .10);
    }

    .auth-left {
      padding: 40px;
      color: #fff;
      background: linear-gradient(135deg, var(--secondary-color), #0095ff);
    }

    .auth-left h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .auth-left p {
      opacity: .9;
    }

    .auth-right {
      padding: 40px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .tab {
      border: 2px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
    }

    .tab.active {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid var(--border);
      outline: none;
    }

    .field input:focus {
      border-color: var(--primary-color);
    }

    .auth-btn {
      width: 100%;
      border: none;
      padding: 14px 16px;
      border-radius: 999px;
      background: var(--primary-color);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
    }

    .auth-btn:hover {
      background: #ff8534;
    }

    .muted {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 10px;
    }

    @media(max-width: 900px) {
      .auth-card {
        grid-template-columns: 1fr;
      }

      .auth-left {
        padding: 28px;
      }

      .auth-right {
        padding: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="top-banner">
    <div class="container">
      <p><i class="fas fa-shield-alt"></i> Secure Login | <i class="fas fa-truck"></i> Free Shipping on Orders Over R500
      </p>
    </div>
  </div>

  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <a href="index.html">
            <img src="logo.png" alt="MarketMyn Logo" style="height: 45px; width: auto; object-fit: contain; vertical-align: middle;">
          </a>
        </div>

        <div class="search-bar">
          <input type="text" placeholder="Search for products, brands, and categories...">
          <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>

        <div class="header-actions">
          <a href="login.html" class="header-link"><i class="fas fa-user"></i> <span>Sign In</span></a>
          <a href="cart.html" class="header-link cart-link">
            <i class="fas fa-shopping-cart"></i> <span>Cart</span>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <section class="auth-wrap">
    <div class="container">
      <div class="auth-card">
        <div class="auth-left">
          <h2>MakertMyn</h2>
        </div>

        <div class="auth-right">
          <h3 style="margin-bottom: 20px; font-size: 24px;">Sign In</h3>

          <form id="loginForm">
            <div class="field">
              <label>Email Address</label>
              <input type="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" placeholder="••••••••" required>
            </div>
            <button class="auth-btn" type="submit">Login</button>

            <div style="margin-top: 15px; text-align: center;">
              <a href="forgot-password.html" style="color:var(--primary-color); font-size:13px; text-decoration:none; font-weight:600;">Forgot Password?</a>
            </div>

            <div class="muted" style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
              <p style="margin-bottom: 10px;">Don't have an account?</p>
              <a href="register.html"
                style="display:block; text-align:center; padding:12px; border:2px solid var(--primary-color); border-radius:999px; color:var(--primary-color); font-weight:700; text-decoration:none; transition:all 0.3s;">
                Create Account
              </a>
              <!-- Removed Vendor Link -->
            </div>


          </form>

        </div>
      </div>
    </div>
  </section>

  <script>
    const CART_KEY = "makertmyn_cart_v1";
    function readCart() { try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { return []; } }
    function cartCount() { return readCart().reduce((s, i) => s + (i.qty || 0), 0); }
    document.getElementById("cartBadge").textContent = cartCount();

    // Simplified toggle for Login pages or just link
    function show(which) {
      // Only for demo UI toggle if we kept tabs
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.querySelector('input[type="email"]').value;
      const password = document.querySelector('input[type="password"]').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          if (data.role === 'seller') {
            alert("This login page is for Customers only. Please use the 'Sell on MakertMyn' link.");
            window.location.href = "seller-auth.html";
          } else {
            localStorage.setItem("makertmyn_user_v1", JSON.stringify({
              name: data.name,
              email: data.email,
              token: data.token,
              loggedIn: true
            }));
            alert("Welcome back, " + data.name + "!");
            window.location.href = "index.html";
          }
        } else {
          alert(data.message || 'Login failed');
        }
      } catch (err) {
        console.error(err);
        alert('Error connecting to server. Make sure backend is running.');
      }
    });
  </script>
  <script src="menu.js"></script>

</body>

</html>
