<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - MakertMyn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dash-wrap {
            background: #f5f5f5;
            padding: 40px 0;
            min-height: 80vh;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        .panel {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .menu-link:hover,
        .menu-link.active {
            background: #f0f7ff;
            color: var(--secondary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .save-btn {
            padding: 12px 30px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #e65e00;
        }
    </style>
</head>

<body>

    <div class="top-banner">
        <div class="container">
            <p><i class="fas fa-truck"></i> Free Shipping on Orders Over R500</p>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
          <a href="index.html">
            <img src="logo.png" alt="MarketMyn Logo" style="height: 45px; width: auto; object-fit: contain; vertical-align: middle;">
          </a>
        </div>
                <div class="header-actions">
                    <a href="index.html" class="header-link"><i class="fas fa-search"></i> Shop</a>
                    <a href="cart.html" class="header-link cart-link"><i class="fas fa-shopping-cart"></i> <span
                            class="cart-badge" id="cartBadge">0</span></a>
                </div>
            </div>
        </div>
    </header>

    <section class="dash-wrap">
        <div class="container">
            <div class="dash-grid">

                <aside class="panel">
                    <nav>
                        <a href="buyer-dashboard.html" class="menu-link"><i class="fas fa-home"></i> Dashboard</a>
                        <a href="order-tracking.html" class="menu-link"><i class="fas fa-box"></i> Orders & Tracking</a>
                        <a href="#" class="menu-link"><i class="fas fa-heart"></i> Wishlist</a>
                        <a href="buyer-profile.html" class="menu-link active"><i class="fas fa-user-cog"></i> Profile
                            Settings</a>
                        <a href="login.html" class="menu-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </nav>
                </aside>

                <main class="panel">
                    <h2 style="margin-bottom:25px;">Profile Settings</h2>

                    <form onsubmit="event.preventDefault(); alert('Profile updated!');">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" value="Thabo">
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" value="Moloi">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="thabo@example.com">
                        </div>

                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" value="082 123 4567">
                        </div>

                        <h3 style="margin: 20px 0 15px;">Shipping Address</h3>

                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" value="42 Main Street, Sandton">
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" value="Johannesburg">
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" value="2196">
                            </div>
                        </div>

                        <button class="save-btn">Save Changes</button>
                    </form>

                </main>

            </div>
        </div>
    </section>

</body>

</html>
