<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Payouts - MakertMyn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dash-wrap {
            background: #f5f5f5;
            padding: 35px 0;
            min-height: 80vh;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 20px;
        }

        .panel {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #f0f7ff;
            color: var(--secondary-color);
        }

        .nav-link i {
            width: 20px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: #888;
            font-weight: 600;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--primary-color);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="top-banner">
        <div class="container">
            <p><i class="fas fa-store"></i> Seller Portal</p>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
          <a href="index.html">
            <img src="logo.png" alt="MarketMyn Logo" style="height: 85px; width: auto; object-fit: contain; mix-blend-mode: multiply; vertical-align: middle; image-rendering: smooth; -webkit-font-smoothing: antialiased;">
          </a>
        </div>
                <div class="header-actions">
                    <button onclick="logout()"
                        style="border:none;background:none;font-weight:700;cursor:pointer;color:var(--danger);">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <section class="dash-wrap">
        <div class="container">
            <div class="dash-grid">
                <aside class="panel">
                    <nav>
                        <a href="seller-dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Overview</a>
                        <a href="seller-orders.html" class="nav-link"><i class="fas fa-receipt"></i> Orders</a>
                        <a href="seller-products.html" class="nav-link"><i class="fas fa-box"></i> Products</a>
                        <a href="seller-payouts.html" class="nav-link active"><i class="fas fa-money-bill-wave"></i>
                            Payouts</a>
                        <a href="seller-analytics.html" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a>
                        <a href="seller-profile.html" class="nav-link"><i class="fas fa-store-alt"></i> Store
                            Settings</a>
                    </nav>
                </aside>

                <main>
                    <div class="panel" style="margin-bottom:20px;">
                        <h2>Request Payout</h2>
                        <p style="color:#666; font-size:14px; margin-bottom:20px;">Available Balance: R<span
                                id="availBalance">0.00</span></p>

                        <div class="input-group" style="max-width:300px;">
                            <label>Amount to Withdraw (R)</label>
                            <input type="number" id="payoutAmount" placeholder="0.00">
                        </div>
                        <button class="btn" onclick="requestPayout()">Submit Request</button>
                    </div>

                    <div class="panel">
                        <h3>Payout History</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Request ID</th>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="payoutTable">
                                <tr>
                                    <td colspan="4">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <script>
        const API_URL = '/api';
        function getToken() { return localStorage.getItem('sellerToken'); }
        if (!getToken()) window.location.href = 'seller-auth.html';

        async function fetchApi(endpoint, method = 'GET', body = null) {
            const token = getToken();
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            const config = { method, headers };
            if (body) config.body = JSON.stringify(body);
            try {
                const res = await fetch(endpoint, config);
                if (res.status === 401) { logout(); return; }
                return await res.json();
            } catch (e) { return null; }
        }

        async function init() {
            // 1. Load Payouts
            const payouts = await fetchApi('/api/payouts');
            const tbody = document.getElementById('payoutTable');
            tbody.innerHTML = '';

            if (!payouts || payouts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No payouts found.</td></tr>';
            } else {
                payouts.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.requestID || 'PAY-' + p._id.substr(-4)}</td>
                            <td>${new Date(p.createdAt).toLocaleDateString()}</td>
                            <td>R${p.amount}</td>
                            <td style="color:${getColor(p.status)};font-weight:bold;">${p.status}</td>
                        </tr>
                    `;
                });
            }

            // 2. Fetch Real Balance
            const balanceRes = await fetchApi('/api/payouts/balance');
            let balance = 0;
            if (balanceRes && balanceRes.balance !== undefined) {
                balance = balanceRes.balance;
            }
            document.getElementById('availBalance').textContent = Math.max(0, balance).toFixed(2);
        }

        async function requestPayout() {
            // We don't need input amount anymore, we payout EVERYTHING available (common pattern or allow partial?)
            // For this logic implemented in controller, it pays out ALL eligible items.
            // So we can ignore the input or validate it matches balance.
            // Let's assume user just clicks "Request Payout" -> withdraws all available.

            // Or if we want to support partial, the backend complexifies (splitting item value). 
            // Current Backend Logic: Finds all unpaid items and pays them out. So it ignores 'amount' body param likely or overwrites it.
            // Let's check controller: It IGNORES request body amount and calculates from items. Good.

            if (confirm("Confirm payout request for all available balance?")) {
                const res = await fetchApi('/api/payouts', 'POST', {});
                if (res && !res.message) {
                    alert("Payout requested successfully!");
                    document.getElementById('payoutAmount').value = ""; // Clear
                    init();
                } else {
                    alert(res.message || "Failed");
                }
            }
        }

        function getColor(s) {
            return s === 'paid' ? 'green' : (s === 'pending' ? 'orange' : 'red');
        }

        function logout() {
            localStorage.removeItem('sellerToken');
            window.location.href = 'seller-auth.html';
        }

        init();
    </script>
</body>

</html>
