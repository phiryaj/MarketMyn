<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Store - MakertMyn</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .store-hero {
      background: #fff;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .store-head {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .store-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .store-name {
      font-size: 24px;
      font-weight: 900;
    }

    .store-meta {
      color: var(--text-light);
      font-size: 14px;
    }

    .store-wrap {
      padding: 24px 0;
      background: #f5f5f5;
      min-height: 70vh;
    }

    .store-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
    }

    .filters label {
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
    }

    .filters select,
    .filters input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      outline: none;
    }

    .filters input:focus,
    .filters select:focus {
      border-color: var(--primary-color);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .p-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .p-img {
      position: relative;
      padding-top: 100%;
      overflow: hidden;
    }

    .p-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .p-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .p-title {
      font-weight: 900;
      font-size: 14px;
      line-height: 1.3;
      min-height: 2.6em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .p-price {
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .p-btn {
      margin-top: auto;
      border: none;
      border-radius: 999px;
      padding: 12px;
      background: var(--primary-color);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .p-btn:hover {
      background: #ff8534;
    }

    @media(max-width:1000px) {
      .store-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="top-banner">
    <div class="container">
      <p><i class="fas fa-store"></i> Vendor Storefront | MakertMyn Marketplace</p>
    </div>
  </div>

  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <a href="index.html">
            <img src="logo.png" alt="MarketMyn Logo" style="height: 85px; width: auto; object-fit: contain; vertical-align: middle; image-rendering: smooth; -webkit-font-smoothing: antialiased;">
          </a>
        </div>

        <div class="search-bar">
          <input type="text" placeholder="Search products in this store..." id="searchInput">
          <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>

        <div class="header-actions">
          <a href="login.html" class="header-link"><i class="fas fa-user"></i> <span>Sign In</span></a>
          <a href="cart.html" class="header-link cart-link">
            <i class="fas fa-shopping-cart"></i> <span>Cart</span>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <section class="store-hero">
    <div class="container">
      <div class="store-head">
        <img class="store-logo" id="storeLogo" src="" alt="Vendor">
        <div>
          <div class="store-name" id="storeName">Vendor</div>
          <div class="store-meta">⭐ 4.8 • Fast shipping • Verified seller</div>
        </div>
        <div style="margin-left:auto;">
          <a href="seller-dashboard.html" class="btn btn-primary" style="text-decoration:none;">Seller Login</a>
        </div>
      </div>
    </div>
  </section>

  <section class="store-wrap">
    <div class="container">
      <div class="store-grid">
        <div class="panel">
          <h2 style="margin-bottom:10px;">Products</h2>
          <p style="color:var(--text-light);margin-bottom:16px;">Only approved products are shown here.</p>
          <div class="products" id="productsGrid"></div>
          <div id="emptyMsg" style="display:none;color:var(--text-light);padding:14px;">No products found.</div>
        </div>

        <aside class="panel filters">
          <h3 style="margin-bottom:10px;">Filter</h3>
          <label>Category</label>
          <select id="catFilter">
            <option value="">All</option>
            <option>Electronics</option>
            <option>Fashion</option>
            <option>Home & Garden</option>
            <option>Health & Beauty</option>
            <option>Sports & Outdoors</option>
            <option>Baby & Toys</option>
            <option>Automotive</option>
            <option>Books</option>
          </select>

          <div style="height:12px;"></div>

          <label>Max price (R)</label>
          <input id="maxPrice" type="number" placeholder="e.g. 1000" />
        </aside>
      </div>
    </div>
  </section>

  <script>
    const CART_KEY = "makertmyn_cart_v1";
    const APPROVED_KEY = "makertmyn_products_approved_v1";

    function read(key) { try { return JSON.parse(localStorage.getItem(key)) || [] } catch { return [] } }
    function write(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    function cartCount() { return read(CART_KEY).reduce((s, i) => s + (i.qty || 0), 0); }
    document.getElementById("cartBadge").textContent = cartCount();

    const params = new URLSearchParams(location.search);
    const vendor = params.get("v") || "TechStore SA";

    document.getElementById("storeName").textContent = vendor;
    document.getElementById("storeLogo").src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(vendor) + "&background=ff6b00&color=fff&size=120";

    const searchInput = document.getElementById("searchInput");
    const catFilter = document.getElementById("catFilter");
    const maxPrice = document.getElementById("maxPrice");

    function addToCart(p) {
      const cart = read(CART_KEY);
      const ex = cart.find(x => x.id === p.id);
      if (ex) ex.qty += 1;
      else cart.push({ id: p.id, name: p.title, price: p.price, image: p.image, vendor: p.vendor, qty: 1 });
      write(CART_KEY, cart);
      document.getElementById("cartBadge").textContent = cartCount();
      showCartModal(p);
    }

    function render() {
      const approved = read(APPROVED_KEY).filter(p => p.vendor === vendor);
      const q = (searchInput.value || "").toLowerCase().trim();
      const cat = catFilter.value;
      const max = parseInt(maxPrice.value || "0", 10);

      const filtered = approved.filter(p => {
        const okQ = !q || (p.title || "").toLowerCase().includes(q);
        const okC = !cat || p.category === cat;
        const okP = !max || p.price <= max;
        return okQ && okC && okP;
      });

      const grid = document.getElementById("productsGrid");
      const empty = document.getElementById("emptyMsg");
      grid.innerHTML = "";

      if (!filtered.length) { empty.style.display = "block"; return; }
      empty.style.display = "none";

      filtered.forEach(p => {
        const card = document.createElement("div");
        card.className = "p-card";
        card.innerHTML = `
        <div class="p-img">
          <a href="product-detail.html?id=${encodeURIComponent(p.id)}" style="display:block;">
            <img src="${p.image}" alt="">
          </a>
        </div>
        <div class="p-body">
          <div class="p-title">${p.title}</div>
          <div class="p-price">R${p.price.toLocaleString("en-ZA")}</div>
          <button class="p-btn">Add to Cart</button>
        </div>
      `;
        card.querySelector("button").addEventListener("click", () => addToCart(p));
        grid.appendChild(card);
      });
    }

    [searchInput, catFilter, maxPrice].forEach(el => el.addEventListener("input", render));
    render();
  </script>

  <script src="menu.js"></script>
</body>

</html>
