<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | MarketMyn</title>
  <meta name="description" content="Reset your MarketMyn account password securely.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .reset-header {
      background: linear-gradient(135deg, #ff6b00, #ff8534);
      padding: 36px 40px 28px;
      text-align: center;
    }

    .reset-header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }

    .reset-header h1 span { font-weight: 400; opacity: 0.9; }

    .reset-header p {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      margin: 0;
    }

    .lock-icon {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
      color: #fff;
    }

    .reset-body {
      padding: 36px 40px;
    }

    .step-title {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      margin: 0 0 6px;
    }

    .step-subtitle {
      color: #64748b;
      font-size: 14px;
      margin: 0 0 28px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: #334155;
      margin-bottom: 7px;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
    }

    .field input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: #ff6b00;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 15px;
      padding: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff6b00, #ff8534);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.93; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg-box {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .msg-box.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
    }

    .msg-box.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #ff6b00; }

    .pw-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .pw-strength-bar {
      height: 4px;
      flex: 1;
      border-radius: 99px;
      background: #e2e8f0;
      transition: background 0.3s;
    }

    .pw-strength-bar.weak   { background: #ef4444; }
    .pw-strength-bar.medium { background: #f59e0b; }
    .pw-strength-bar.strong { background: #22c55e; }

    .pw-hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }

    @media (max-width: 500px) {
      .reset-body { padding: 28px 24px; }
      .reset-header { padding: 28px 24px 22px; }
    }
  </style>
</head>

<body>

  <div class="reset-card">
    <div class="reset-header">
      <div class="lock-icon"><i class="fas fa-lock"></i></div>
      <h1>Market<span>Myn</span></h1>
      <p>Secure Account Recovery</p>
    </div>

    <div class="reset-body">

      <!-- ── STEP 1: Request email ── -->
      <div id="stepRequest">
        <p class="step-title">Forgot your password?</p>
        <p class="step-subtitle">Enter your email address and we'll send you a secure reset link valid for 15 minutes.</p>

        <div id="reqMsg" class="msg-box"></div>

        <form id="forgotForm">
          <div class="field">
            <label for="resetEmail">Email Address</label>
            <div class="field-wrap">
              <i class="fas fa-envelope"></i>
              <input type="email" id="resetEmail" placeholder="you@example.com" required>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="reqBtn">
            <i class="fas fa-paper-plane"></i> Send Reset Link
          </button>
        </form>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>

      <!-- ── STEP 2: Set new password (shown when ?token=...&uid=... in URL) ── -->
      <div id="stepReset" style="display:none;">
        <p class="step-title">Set a New Password</p>
        <p class="step-subtitle">Choose a strong password. You'll be redirected to login once it's saved.</p>

        <div id="resetMsg" class="msg-box"></div>

        <form id="resetForm">
          <div class="field">
            <label for="newPassword">New Password</label>
            <div class="field-wrap">
              <i class="fas fa-key"></i>
              <input type="password" id="newPassword" placeholder="Min. 8 characters" required minlength="8">
              <button type="button" class="toggle-pw" onclick="togglePw('newPassword', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="pw-strength">
              <div class="pw-strength-bar" id="bar1"></div>
              <div class="pw-strength-bar" id="bar2"></div>
              <div class="pw-strength-bar" id="bar3"></div>
              <div class="pw-strength-bar" id="bar4"></div>
            </div>
            <p class="pw-hint" id="pwHint">Enter at least 8 characters</p>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <div class="field-wrap">
              <i class="fas fa-key"></i>
              <input type="password" id="confirmPassword" placeholder="Repeat your new password" required>
              <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="resetBtn">
            <i class="fas fa-shield-alt"></i> Reset Password
          </button>
        </form>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const TOKEN = params.get('token');
    const UID   = params.get('uid');

    // Show step 2 if token + uid are in URL
    if (TOKEN && UID) {
      document.getElementById('stepRequest').style.display = 'none';
      document.getElementById('stepReset').style.display   = 'block';
    }

    // ── Show message helper ──────────────────────────────────────────────────
    function showMsg(boxId, type, text) {
      const box = document.getElementById(boxId);
      box.className = `msg-box ${type}`;
      box.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}`;
      box.style.display = 'flex';
    }

    // ── Toggle password visibility ───────────────────────────────────────────
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    // ── Password strength indicator ──────────────────────────────────────────
    document.getElementById('newPassword').addEventListener('input', function () {
      const val = this.value;
      const bars = [document.getElementById('bar1'), document.getElementById('bar2'),
                    document.getElementById('bar3'), document.getElementById('bar4')];
      const hint = document.getElementById('pwHint');

      let strength = 0;
      if (val.length >= 8)  strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const classes = ['', 'weak', 'medium', 'medium', 'strong'];
      const colors  = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];

      bars.forEach((b, i) => {
        b.className = 'pw-strength-bar ' + (i < strength ? classes[strength] : '');
      });

      hint.textContent = val.length === 0
        ? 'Enter at least 8 characters'
        : `Strength: ${labels[strength]}`;
      hint.style.color = colors[strength] || '#94a3b8';
    });

    // ── STEP 1: Send forgot password request ─────────────────────────────────
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value.trim();
      const btn   = document.getElementById('reqBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email })
        });
        const data = await res.json();

        showMsg('reqMsg', 'success', data.message || 'Reset link sent! Check your inbox.');
        document.getElementById('forgotForm').style.display = 'none';

      } catch (err) {
        showMsg('reqMsg', 'error', 'Could not connect to server. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
      }
    });

    // ── STEP 2: Submit new password ───────────────────────────────────────────
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('resetBtn');

      if (password !== confirm) {
        return showMsg('resetMsg', 'error', 'Passwords do not match.');
      }
      if (password.length < 8) {
        return showMsg('resetMsg', 'error', 'Password must be at least 8 characters.');
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        const res  = await fetch(`/api/auth/reset-password/${TOKEN}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ userId: UID, password })
        });
        const data = await res.json();

        if (res.ok) {
          showMsg('resetMsg', 'success', data.message || 'Password reset! Redirecting to login...');
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => { window.location.href = '/login.html'; }, 2500);
        } else {
          showMsg('resetMsg', 'error', data.message || 'Reset failed. Please request a new link.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-shield-alt"></i> Reset Password';
        }
      } catch (err) {
        showMsg('resetMsg', 'error', 'Could not connect to server. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-shield-alt"></i> Reset Password';
      }
    });
  </script>

</body>
</html>
