<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MakertMyn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .brand h2 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .brand span {
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-block:hover {
            background: #e67e22;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand">
            <h2>Market<span>Myn</span></h2>
            <p style="color:#888; margin-bottom:30px;">Admin Panel Access</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="admin@marketmyn.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-block">Login to Dashboard</button>
            <p class="error-msg" id="errorMsg">Invalid credentials or access denied.</p>
        </form>

        <p style="margin-top:20px; font-size:12px; color:#aaa;">
            &copy; 2024 MakertMyn Holdings. Restricted Area.
        </p>
    </div>

    <script>
        // Determine API base URL (Backend runs on 5000)
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');

            btn.textContent = 'Verifying...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    if (data.role === 'admin' || data.role === 'super_admin') {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminUser', JSON.stringify(data));

                        if (window.location.protocol === 'file:') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = '/admin-dashboard.html';
                        }
                    } else {
                        throw new Error('Access Denied: Admins Only');
                    }
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.textContent = 'Login to Dashboard';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
